<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<style>
  :root {
    --bg: #0b0e11;
    --card: #141921;
    --card-hover: #1a2030;
    --border: #1e2738;
    --text: #e1e4ea;
    --text-dim: #7a8599;
    --accent: #4a9eff;
    --green: #00c896;
    --red: #ff4d6a;
    --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(11, 14, 17, .85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.5px; }
  header h1 span { color: var(--accent); }
  .header-user { color: var(--text-dim); font-size: .9rem; }

  /* ---- Main ---- */
  main { max-width: 1280px; margin: 0 auto; padding: 32px 24px 60px; }

  /* ---- Summary Cards ---- */
  .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 36px; }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    transition: background .2s;
  }
  .summary-card:hover { background: var(--card-hover); }
  .summary-card .label { font-size: .78rem; text-transform: uppercase; letter-spacing: .8px; color: var(--text-dim); margin-bottom: 6px; }
  .summary-card .value { font-size: 1.65rem; font-weight: 700; }

  /* ---- Tabs ---- */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: .9rem;
    cursor: pointer;
    font-family: var(--font);
    transition: all .2s;
  }
  .tab:hover { color: var(--text); background: var(--card); }
  .tab.active { color: #fff; background: var(--accent); }

  /* ---- Account Sections ---- */
  .account-section { margin-bottom: 28px; }
  .account-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .account-name { font-weight: 600; font-size: 1.05rem; }
  .account-stats { display: flex; gap: 24px; font-size: .85rem; color: var(--text-dim); }
  .account-stats span { white-space: nowrap; }

  /* ---- Table ---- */
  .positions-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  .positions-table th {
    text-align: left;
    padding: 12px 16px;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .7px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  .positions-table td {
    padding: 14px 16px;
    font-size: .9rem;
    border-bottom: 1px solid var(--border);
  }
  .positions-table tr:last-child td { border-bottom: none; }
  .positions-table tr:hover td { background: var(--card-hover); }

  .symbol-cell { font-weight: 700; letter-spacing: .3px; }
  .type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: .72rem;
    font-weight: 600;
    text-transform: uppercase;
  }
  .type-Stock { background: #1a365d; color: #63b3ed; }
  .type-ETF { background: #22543d; color: #68d391; }
  .type-Crypto { background: #553c9a; color: #b794f4; }
  .type-Forex { background: #744210; color: #f6ad55; }

  .dir-LONG { color: var(--green); font-weight: 600; font-size: .8rem; }
  .dir-SHORT { color: var(--red); font-weight: 600; font-size: .8rem; }

  .positive { color: var(--green); }
  .negative { color: var(--red); }
  .mono { font-variant-numeric: tabular-nums; }

  /* ---- Loading ---- */
  .loading {
    text-align: center;
    padding: 80px 0;
    color: var(--text-dim);
    font-size: 1.1rem;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- Error ---- */
  .error-msg {
    text-align: center; padding: 60px 20px;
    color: var(--red); font-size: 1rem;
  }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    main { padding: 20px 12px 40px; }
    .positions-table { font-size: .82rem; }
    .positions-table th, .positions-table td { padding: 10px 10px; }
    .summary { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1><span>&#9670;</span> Portfolio</h1>
  <div class="header-user" id="user-info"></div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    Loading portfolio&hellip;
  </div>
  <div id="content" style="display:none;">
    <div class="summary" id="summary-cards"></div>
    <div class="tabs" id="tabs"></div>
    <div id="accounts-container"></div>
  </div>
  <div id="error" class="error-msg" style="display:none;"></div>
</main>

<script>
(function () {
  const $ = (sel) => document.querySelector(sel);

  let data = null;
  let activeTab = 'all';

  async function loadPortfolio() {
    try {
      const res = await fetch('/api/portfolio');
      if (!res.ok) throw new Error('Server returned ' + res.status);
      data = await res.json();
      render();
    } catch (e) {
      $('#loading').style.display = 'none';
      $('#error').style.display = 'block';
      $('#error').textContent = 'Failed to load portfolio: ' + e.message;
    }
  }

  function fmt(n) {
    return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function pctClass(v) { return v >= 0 ? 'positive' : 'negative'; }
  function sign(v) { return v >= 0 ? '+' : ''; }

  function render() {
    $('#loading').style.display = 'none';
    $('#content').style.display = '';

    // User info
    $('#user-info').textContent = data.username;

    // Count all positions
    let posCount = 0;
    let accountCount = data.accounts.length;
    data.accounts.forEach(a => posCount += a.positions.length);

    // Summary cards
    const cards = [
      { label: 'Total Value', value: '$' + fmt(data.totalValue) },
      { label: 'Total P&L', value: sign(data.totalProfit) + '$' + fmt(Math.abs(data.totalProfit)), cls: pctClass(data.totalProfit) },
      { label: 'Return', value: sign(data.totalProfitPct) + fmt(Math.abs(data.totalProfitPct)) + '%', cls: pctClass(data.totalProfitPct) },
      { label: 'Accounts', value: accountCount },
      { label: 'Positions', value: posCount },
    ];

    $('#summary-cards').innerHTML = cards.map(c =>
      `<div class="summary-card">
        <div class="label">${c.label}</div>
        <div class="value ${c.cls || ''}">${c.value}</div>
      </div>`
    ).join('');

    // Tabs
    const tabs = [{ id: 'all', label: 'All Accounts' }];
    data.accounts.forEach(a => tabs.push({ id: a.provider, label: a.provider }));
    $('#tabs').innerHTML = tabs.map(t =>
      `<button class="tab ${t.id === activeTab ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`
    ).join('');
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        render();
      });
    });

    // Accounts
    const accounts = activeTab === 'all' ? data.accounts : data.accounts.filter(a => a.provider === activeTab);
    $('#accounts-container').innerHTML = accounts.map(renderAccount).join('');
  }

  function renderAccount(account) {
    const profitCls = pctClass(account.totalProfit);
    const rows = account.positions.map(p => {
      const pCls = pctClass(p.profit);
      return `<tr>
        <td class="symbol-cell">${esc(p.symbol)}</td>
        <td><span class="type-badge type-${esc(p.assetType)}">${esc(p.assetType)}</span></td>
        <td><span class="dir-${esc(p.direction)}">${esc(p.direction)}</span></td>
        <td class="mono">${Math.abs(p.quantity)}</td>
        <td class="mono">$${fmt(p.originalPrice)}</td>
        <td class="mono">$${fmt(p.currentPrice)}</td>
        <td class="mono">$${fmt(Math.abs(p.totalValue))}</td>
        <td class="mono ${pCls}">${sign(p.profit)}$${fmt(Math.abs(p.profit))}</td>
        <td class="mono ${pCls}">${sign(p.profitPct)}${fmt(Math.abs(p.profitPct))}%</td>
      </tr>`;
    }).join('');

    return `<div class="account-section">
      <div class="account-header">
        <div class="account-name">${esc(account.provider)}</div>
        <div class="account-stats">
          <span>Value: <strong>$${fmt(account.totalValue)}</strong></span>
          <span>P&L: <strong class="${profitCls}">${sign(account.totalProfit)}$${fmt(Math.abs(account.totalProfit))}</strong></span>
          <span>Return: <strong class="${profitCls}">${sign(account.totalProfitPct)}${fmt(Math.abs(account.totalProfitPct))}%</strong></span>
        </div>
      </div>
      <table class="positions-table">
        <thead><tr>
          <th>Symbol</th><th>Type</th><th>Direction</th><th>Qty</th>
          <th>Avg Cost</th><th>Price</th><th>Value</th><th>P&L</th><th>Return</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  loadPortfolio();
})();
</script>
</body>
</html>
